<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Courses | LearnSphere</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="./css/bootstrap.min.css" />
  <!-- FontAwesome CSS -->
  <link rel="stylesheet" href="./css/all.min.css" />
  <!-- Style CSS -->
  <link rel="stylesheet" href="./css/style.css" />
</head>

<body>

  <!-- ===== Navbar ===== -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light sticky-top shadow">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">LearnSphere</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="courses.html">Courses</a></li>
            <li class="nav-item"><a class="nav-link" href="my-learning.html">My Learning</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Instructors</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
        </ul>

        <span class="badge bg-primary ms-3" id="count">0</span>

        <div class="ms-4">
          <input type="checkbox" id="toggle_btn" hidden />
          <label for="toggle_btn" class="theme-toggle">
            <i class="fa-solid fa-moon moon"></i>
            <i class="fa-solid fa-sun sun"></i>
          </label>
        </div>
      </div>
    </div>
  </nav>

  <!-- ===== Courses Section ===== -->
  <section class="py-5">
    <div class="container">
      <h2 class="fw-bold mb-4 text-center">Explore Our Courses</h2>

      <!-- Search -->
      <div class="mb-3">
        <input
          type="text"
          id="searchInput"
          class="form-control"
          placeholder="Search by course title or instructor..."
        />
      </div>

      <!-- Filters Row -->
      <div class="row g-3 mb-4">
        <div class="col-lg-6">
          <div class="d-flex flex-wrap gap-2" id="categoryButtons">
            <button class="btn btn-outline-primary filter-btn active" data-category="All">All</button>
            <button class="btn btn-outline-primary filter-btn" data-category="Web Development">Web Development</button>
            <button class="btn btn-outline-primary filter-btn" data-category="Data Science">Data Science</button>
            <button class="btn btn-outline-primary filter-btn" data-category="Design">Design</button>
            <button class="btn btn-outline-primary filter-btn" data-category="Cybersecurity">Cybersecurity</button>
            <button class="btn btn-outline-primary filter-btn" data-category="Mobile Dev">Mobile Dev</button>
            <button class="btn btn-outline-primary filter-btn" data-category="DevOps">DevOps</button>
          </div>
        </div>

        <div class="col-md-6 col-lg-3">
          <select class="form-select" id="levelFilter">
            <option value="All">All Levels</option>
            <option value="Beginner">Beginner</option>
            <option value="Intermediate">Intermediate</option>
            <option value="Advanced">Advanced</option>
          </select>
        </div>

        <div class="col-md-6 col-lg-3">
          <select class="form-select" id="sortSelect">
            <option value="">Sort By</option>
            <option value="rating">Rating High → Low</option>
            <option value="priceLow">Price Low → High</option>
            <option value="priceHigh">Price High → Low</option>
            <option value="duration">Duration Shortest</option>
          </select>
        </div>
      </div>

      <!-- Courses -->
      <div class="row g-4" id="coursesContainer"></div>
    </div>
  </section>

  <script src="./js/bootstrap.bundle.min.js"></script>
  <script src="./js/courses.js"></script>
</body>
</html>
