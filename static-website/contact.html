<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | LearnSphere</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="./css/bootstrap.min.css" />
  <!-- FontAwesome CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <!-- Style CSS -->
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>

  <!-- ===== Navbar ===== -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light sticky-top shadow">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">LearnSphere</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>
          <li class="nav-item"><a class="nav-link" href="my-learning.html">My Learning</a></li>
          <li class="nav-item"><a class="nav-link" href="instructors.html">Instructors</a></li>
          <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
        </ul>

        <span class="badge bg-primary ms-3" id="count">0</span>

        <div class="ms-4">
          <input type="checkbox" id="toggle_btn" hidden />
          <label for="toggle_btn" class="theme-toggle">
            <i class="fa-solid fa-moon moon"></i>
            <i class="fa-solid fa-sun sun"></i>
          </label>
        </div>
      </div>
    </div>
  </nav>

  <!-- ===== Contact Section ===== -->
  <section class="py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card shadow-sm border-0 p-4">
            <h2 class="fw-bold text-center mb-4">Contact Us</h2>

            <form id="contactForm">
              <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" id="name" />
                <small class="text-danger" id="nameError"></small>
              </div>

              <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" />
                <small class="text-danger" id="emailError"></small>
              </div>

              <div class="mb-3">
                <label class="form-label">Subject</label>
                <input type="text" class="form-control" id="subject" />
                <small class="text-danger" id="subjectError"></small>
              </div>

              <div class="mb-3">
                <label class="form-label">Message</label>
                <textarea class="form-control" id="message" rows="5"></textarea>
                <small class="text-danger" id="messageError"></small>
              </div>

              <button type="submit" class="btn btn-primary w-100">Send Message</button>
            </form>

            <div id="successMessage" class="alert alert-success mt-4 d-none text-center">
              Your message has been sent successfully!
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="./js/bootstrap.bundle.min.js"></script>
  <script src="./js/contact.js"></script>
</body>
</html>
